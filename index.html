<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="五十音">
<meta name="theme-color" content="#F7F3EC">
<link rel="apple-touch-icon" href="/icon.png">
<title>五十音學習基地</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#e0dbd2;font-family:system-ui,-apple-system,sans-serif;}
.app{background:#F7F3EC;max-width:430px;margin:0 auto;min-height:100vh;}
.page{display:none;padding:52px 20px 40px;min-height:100vh;flex-direction:column;}
.page.active{display:flex;}
.safe-top{height:env(safe-area-inset-top,20px);}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
@keyframes wiggle{0%,100%{transform:rotate(-7deg);}50%{transform:rotate(7deg);}}
@keyframes spin{to{transform:rotate(360deg);}}
.bounce{animation:bounce 1.4s infinite ease-in-out;}
.wiggle{animation:wiggle 1s infinite ease-in-out;}
.p1-header{font-size:28px;font-weight:800;color:#1a1a1a;line-height:1.2;margin-bottom:4px;}
.p1-sub{font-size:13px;color:#888;font-weight:500;margin-bottom:20px;}
.habit-card{background:#FFE66D;border-radius:28px;padding:18px;margin-bottom:14px;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.day-label{font-size:10px;font-weight:700;color:#92400E;text-align:center;padding-bottom:4px;}
.day-cell{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;}
.day-cell.done{background:#FF6B6B;color:#fff;}
.day-cell.empty{background:rgba(255,255,255,0.45);color:#B45309;}
.day-cell.today{background:#1a1a1a;color:#FFE66D;}
.day-cell.future{background:rgba(255,255,255,0.18);color:#D4A017;cursor:default;}
.streak-row{display:flex;gap:8px;margin-bottom:14px;}
.streak-box{flex:1;border-radius:22px;padding:12px 8px;text-align:center;}
.streak-num{font-size:22px;font-weight:800;color:#1a1a1a;line-height:1;}
.streak-lbl{font-size:10px;font-weight:600;margin-top:3px;}
.progress-section{background:#E8E4F0;border-radius:24px;padding:14px;margin-bottom:14px;}
.progress-bar-track{flex:1;height:10px;background:#fff;border-radius:20px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:20px;transition:width 0.3s;}
.history-card{background:#E8E3DA;border-radius:28px;padding:16px 18px;margin-bottom:14px;}
.history-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:16px;padding:10px 14px;margin-bottom:7px;}
.plan-card{background:#A8E6CF;border-radius:28px;padding:16px 18px;margin-bottom:14px;}
.plan-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.plan-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.start-btn{background:#FF6B6B;border-radius:32px;padding:20px;text-align:center;cursor:pointer;border:none;width:100%;transition:transform 0.12s;margin-top:auto;}
.start-btn:active{transform:scale(0.97);}
.back-btn{background:none;border:none;font-size:24px;cursor:pointer;margin-bottom:10px;align-self:flex-start;}
.p2-header{font-size:22px;font-weight:800;color:#1a1a1a;margin-bottom:4px;}
.p2-sub{font-size:13px;color:#888;margin-bottom:10px;}
.script-toggle{display:flex;gap:8px;margin-bottom:10px;}
.script-btn{flex:1;padding:10px;border-radius:22px;border:none;font-size:12px;font-weight:700;cursor:pointer;}
.section-tab-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.section-tab{padding:7px 14px;border-radius:18px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:#E8E3DA;color:#888;transition:all 0.15s;}
.section-tab.active{color:#1a1a1a;}
.row-label{font-size:11px;font-weight:700;color:#888;margin-bottom:6px;margin-top:10px;}
.kana-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
.kana-chip{border-radius:16px;padding:8px 10px;font-size:18px;font-weight:700;cursor:pointer;color:#1a1a1a;min-width:50px;text-align:center;transition:transform 0.1s;position:relative;display:flex;align-items:center;gap:4px;}
.kana-chip.selected{outline:3px solid #1a1a1a;transform:scale(1.08);}
.kana-chip:active{transform:scale(0.84);}
.speak-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;opacity:0.8;border-radius:12px;}
.speak-btn:active{opacity:1;transform:scale(1.15);background:rgba(0,0,0,0.08);}
.vocab-panel{border-radius:28px;padding:18px;margin-top:14px;}
.vocab-item{border-radius:18px;padding:12px 14px;margin-bottom:8px;}
.vocab-word{font-size:18px;font-weight:700;color:#1a1a1a;}
.vocab-mean{font-size:12px;font-weight:600;color:#555;margin-top:1px;}
.to-scene-btn{background:#1a1a1a;color:#F7F3EC;border:none;border-radius:22px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:12px;}
.lesson-card{border-radius:28px;padding:18px;margin-bottom:12px;}
.sentence-jp{font-size:19px;font-weight:700;color:#1a1a1a;margin-bottom:4px;line-height:1.5;}
.sentence-roma{font-size:12px;color:#555;margin-bottom:4px;}
.sentence-zh{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:12px;}
.word-breakdown{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.word-tag{border-radius:10px;padding:5px 9px;font-size:11px;font-weight:700;}
.quiz-box{background:rgba(0,0,0,0.08);border-radius:20px;padding:14px;}
.quiz-q{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:10px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{padding:11px 8px;border-radius:16px;border:none;font-size:13px;font-weight:700;cursor:pointer;color:#1a1a1a;transition:all 0.12s;}
.opt:active{transform:scale(0.92);}
.opt.correct{background:#4ECDC4;color:#003330;}
.opt.wrong{background:#FF6B6B;color:#fff;}
.quiz-res{font-size:12px;font-weight:700;margin-top:8px;min-height:18px;}
.extra-quiz-section{background:#C9B1FF;border-radius:28px;padding:18px;margin-bottom:14px;}
.eq-title{font-size:13px;font-weight:700;color:#3B0764;margin-bottom:12px;}
.eq-q{font-size:15px;font-weight:700;color:#1a1a1a;background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.next-btn{background:#1a1a1a;color:#F7F3EC;border:none;border-radius:22px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;}
.session-bar{display:flex;justify-content:space-between;align-items:center;background:#E8E3DA;border-radius:20px;padding:10px 16px;margin-bottom:14px;}
.s-stat{text-align:center;}
.s-num{font-size:18px;font-weight:800;color:#1a1a1a;}
.s-lbl{font-size:10px;font-weight:600;color:#888;}
.stop-btn{background:#FF6B6B;color:#fff;border:none;border-radius:14px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;}
.loading{background:#F0EBE3;border-radius:28px;padding:32px 16px;text-align:center;}
.spinner{width:36px;height:36px;border:4px solid #E8E3DA;border-top-color:#FF9EC4;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
.err{background:#FECACA;border-radius:28px;padding:20px;text-align:center;}
.speak-big-btn{background:#FFE66D;border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;display:flex;align-items:center;gap:6px;}
</style>
</head>
<body>
<div class="app">
<div class="page active" id="page1">
  <div class="safe-top"></div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;">
    <div><div class="p1-header">五十音<br>學習基地</div><div class="p1-sub" id="todayLabel"></div></div>
    <div class="bounce" id="p1char" style="width:74px;height:74px;"></div>
  </div>
  <div class="habit-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <button onclick="prevMonth()" style="background:none;border:none;font-size:18px;font-weight:700;cursor:pointer;color:#92400E;">‹</button>
        <span id="habitMonthLabel" style="font-size:13px;font-weight:700;color:#1a1a1a;"></span>
        <button id="nextMonthBtn" onclick="nextMonth()" style="background:none;border:none;font-size:18px;font-weight:700;cursor:pointer;color:#92400E;">›</button>
      </div>
      <span style="font-size:11px;color:#92400E;">點擊標記完成</span>
    </div>
    <div class="month-grid" id="monthGrid"></div>
  </div>
  <div class="streak-row">
    <div class="streak-box" style="background:#FF9EC4;"><div class="streak-num" id="streakNum">0</div><div class="streak-lbl" style="color:#6B0032;">連續天🔥</div></div>
    <div class="streak-box" style="background:#74C7FF;"><div class="streak-num" id="doneNum">0</div><div class="streak-lbl" style="color:#002B6B;">本月完成✓</div></div>
    <div class="streak-box" style="background:#FFE66D;"><div class="streak-num" id="totalCorrectDisp">0</div><div class="streak-lbl" style="color:#92400E;">累積答對★</div></div>
    <div class="streak-box" style="background:#A8E6CF;"><div class="streak-num" id="totalSessionDisp">0</div><div class="streak-lbl" style="color:#065F46;">練習次數</div></div>
  </div>
  <div class="progress-section">
    <div style="font-size:13px;font-weight:700;color:#5a4fcf;margin-bottom:10px;">學習進度</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-size:12px;font-weight:600;color:#7c78c0;width:52px;">平假名</span>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="hiraProgressBar" style="background:#F9A8D4;width:0%"></div></div>
      <span style="font-size:12px;font-weight:700;color:#7c78c0;width:32px;text-align:right;" id="hiraProgressPct">0%</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;font-weight:600;color:#7c78c0;width:52px;">片假名</span>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="kataProgressBar" style="background:#93C5FD;width:0%"></div></div>
      <span style="font-size:12px;font-weight:700;color:#7c78c0;width:32px;text-align:right;" id="kataProgressPct">0%</span>
    </div>
  </div>
  <div class="history-card">
    <div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:12px;">練習記錄（最近5次）</div>
    <div id="historyList"><div style="font-size:12px;color:#aaa;text-align:center;padding:8px 0;">還沒有記錄，快去做題目！</div></div>
  </div>
  <div class="plan-card">
    <div style="font-size:13px;font-weight:700;color:#065F46;margin-bottom:10px;">學習方式</div>
    <div class="plan-row"><div class="plan-icon" style="background:#FFE66D;">🔊</div><div style="font-size:12px;font-weight:600;color:#065F46;">點假名旁的喇叭聽發音</div></div>
    <div class="plan-row"><div class="plan-icon" style="background:#FF9EC4;">👀</div><div style="font-size:12px;font-weight:600;color:#065F46;">清音、濁音、拗音全部收錄</div></div>
    <div class="plan-row" style="margin-bottom:0"><div class="plan-icon" style="background:#C9B1FF;">✏️</div><div style="font-size:12px;font-weight:600;color:#065F46;">AI 生成例句考題，循序漸進</div></div>
  </div>
  <button class="start-btn" onclick="goPage(2)">
    <div style="font-size:22px;font-weight:800;color:#fff;">開始學習 →</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px;">清音・濁音・拗音・發音全部收錄！</div>
  </button>
</div>

<div class="page" id="page2">
  <div class="safe-top"></div>
  <button class="back-btn" onclick="goPage(1)">←</button>
  <div class="p2-header">五十音表</div>
  <div class="p2-sub">點🔊聽發音・點假名學習</div>
  <div class="script-toggle">
    <button id="hiraBtn" class="script-btn" style="background:#FF9EC4;color:#6B0032;" onclick="setScript('hira')">平假名 ひ</button>
    <button id="kataBtn" class="script-btn" style="background:#E8E3DA;color:#888;" onclick="setScript('kata')">片假名 ア</button>
  </div>
  <div class="section-tab-row">
    <button class="section-tab active" id="tab-seion" onclick="setSection('seion')" style="background:#FF9EC4;color:#6B0032;">清音</button>
    <button class="section-tab" id="tab-dakuten" onclick="setSection('dakuten')">濁音・半濁音</button>
    <button class="section-tab" id="tab-youon" onclick="setSection('youon')">拗音</button>
  </div>
  <div id="kanaGrid"></div>
  <div id="vocabPanel" style="display:none;"></div>
</div>

<div class="page" id="page3">
  <div class="safe-top"></div>
  <button class="back-btn" onclick="goPage(2)">←</button>
  <div class="p2-header" id="p3title">例句 &amp; 練習</div>
  <div id="sessionBarWrap"></div>
  <div id="lessonArea"></div>
  <div id="extraQuizArea"></div>
</div>
</div>

<script>
const CHAR_SVG={
  excited:`<svg viewBox="0 0 60 60" width="100%" height="100%"><circle cx="30" cy="30" r="27" fill="#F48FB1"/><ellipse cx="20" cy="27" rx="6" ry="7" fill="#1a1a1a"/><ellipse cx="40" cy="27" rx="6" ry="7" fill="#1a1a1a"/><ellipse cx="18" cy="25" rx="2" ry="2.5" fill="#fff"/><ellipse cx="38" cy="25" rx="2" ry="2.5" fill="#fff"/><path d="M18 40 Q30 49 42 40" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/><ellipse cx="12" cy="33" rx="5" ry="3" fill="#F06292" opacity=".65"/><ellipse cx="48" cy="33" rx="5" ry="3" fill="#F06292" opacity=".65"/></svg>`,

  bored:`<svg viewBox="0 0 60 60" width="100%" height="100%"><rect x="4" y="4" width="52" height="52" rx="17" fill="#388E3C"/><ellipse cx="20" cy="27" rx="6" ry="7" fill="#1a1a1a"/><ellipse cx="40" cy="27" rx="6" ry="7" fill="#1a1a1a"/><ellipse cx="18" cy="24" rx="2.5" ry="3" fill="#fff"/><ellipse cx="38" cy="24" rx="2.5" ry="3" fill="#fff"/><rect x="18" y="40" width="24" height="4" rx="2" fill="#1a1a1a"/></svg>`,
  stressed:`<svg viewBox="0 0 60 60" width="100%" height="100%"><polygon points="30,5 57,54 3,54" fill="#43A047"/><ellipse cx="21" cy="38" rx="5.5" ry="6" fill="#1a1a1a"/><ellipse cx="39" cy="38" rx="5.5" ry="6" fill="#1a1a1a"/><ellipse cx="19" cy="36" rx="2" ry="2.5" fill="#fff"/><ellipse cx="37" cy="36" rx="2" ry="2.5" fill="#fff"/><path d="M15 33 L22 29" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/><path d="M38 29 L45 33" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/><rect x="19" y="48" width="22" height="3.5" rx="1.7" fill="#1a1a1a"/></svg>`,
};
const CK=Object.keys(CHAR_SVG);
const CC=['#FFE66D','#FF9EC4','#74C7FF','#A8E6CF','#FFBC85','#C9B1FF'];
const OC=['#FF9EC4','#74C7FF','#A8E6CF','#FFBC85'];
const VC=['#FFE66D','#FF9EC4','#74C7FF','#A8E6CF','#FFBC85'];
const WC=['#FFE66D','#FF9EC4','#74C7FF','#A8E6CF','#FFBC85','#C9B1FF'];
const CHIP_C=['#FFE66D','#FF9EC4','#74C7FF','#A8E6CF','#FFBC85','#C9B1FF','#FF9EC4','#FFE66D','#A8E6CF','#74C7FF'];
const CHIP_D=['#D4E4FF','#FFD4E8','#D4FFE8','#FFE8D4','#E8D4FF','#D4F0FF'];
const CHIP_Y=['#FFF0D4','#FFD4F0','#D4F0FF','#D4FFD4','#F0D4FF','#FFD4D4'];

// 清音
const HIRA_SEION=[
  {row:'あ行',items:[{k:'あ',r:'a'},{k:'い',r:'i'},{k:'う',r:'u'},{k:'え',r:'e'},{k:'お',r:'o'}]},
  {row:'か行',items:[{k:'か',r:'ka'},{k:'き',r:'ki'},{k:'く',r:'ku'},{k:'け',r:'ke'},{k:'こ',r:'ko'}]},

// 濁音・半濁音
const HIRA_DAKUTEN=[

// 拗音
const HIRA_YOUON=[
  {row:'きゃ行',items:[{k:'きゃ',r:'kya'},{k:'きゅ',r:'kyu'},{k:'きょ',r:'kyo'}]},
  {row:'しゃ行',items:[{k:'しゃ',r:'sha'},{k:'しゅ',r:'shu'},{k:'しょ',r:'sho'}]},

  {row:'にゃ行',items:[{k:'にゃ',r:'nya'},{k:'にゅ',r:'nyu'},{k:'にょ',r:'nyo'}]},

  {row:'りゃ行',items:[{k:'りゃ',r:'rya'},{k:'りゅ',r:'ryu'},{k:'りょ',r:'ryo'}]},
  {row:'ぎゃ行',items:[{k:'ぎゃ',r:'gya'},{k:'ぎゅ',r:'gyu'},{k:'ぎょ',r:'gyo'}]},

function getKanaData(){
  const s=SC,sec=SECTION;
  if(s==='hira'&&sec==='seion') return HIRA_SEION;
  if(s==='hira'&&sec==='dakuten') return HIRA_DAKUTEN;
  if(s==='hira'&&sec==='youon') return HIRA_YOUON;
  if(s==='kata'&&sec==='seion') return KATA_SEION;
  if(s==='kata'&&sec==='dakuten') return KATA_DAKUTEN;
  return KATA_YOUON;
}
function getAllKana(){
  const s=SC;
  const all=[];
  const sets=s==='hira'?[HIRA_SEION,HIRA_DAKUTEN,HIRA_YOUON]:[KATA_SEION,KATA_DAKUTEN,KATA_YOUON];
  sets.forEach(set=>set.forEach(row=>row.items.forEach(i=>all.push(i.k))));
  return all;
}

// Speech
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP';u.rate=0.8;u.pitch=1.1;
    // Try to find Japanese voice
    const voices=window.speechSynthesis.getVoices();
    const jaVoice=voices.find(v=>v.lang==='ja-JP'||v.lang==='ja'||v.lang.startsWith('ja'));
    if(jaVoice)u.voice=jaVoice;
    window.speechSynthesis.speak(u);
  },100);
}

const NOW=new Date(),TY=NOW.getFullYear(),TM=NOW.getMonth(),TD=NOW.getDate();
function dim(y,m){return new Date(y,m+1,0).getDate();}
function fwmf(y,m){return(new Date(y,m,1).getDay()+6)%7;}
function lg(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ldd(y,m){return new Set(lg('dd_'+y+'_'+m,[]));}
function sdd(y,m,s){ls('dd_'+y+'_'+m,[...s]);}
function lhist(){return lg('qhist',[]);}
function shist(h){ls('qhist',h);}
function ahist(correct,total,kana){
  const h=lhist();const n=new Date(),mm=n.getMonth()+1,dd=n.getDate();
  const wd=['日','一','二','三','四','五','六'];
  h.unshift({date:`${mm}/${dd}週${wd[n.getDay()]}`,kana,correct,total,pct:total>0?Math.round(correct/total*100):0});
  if(h.length>30)h.pop();shist(h);
}

function getLearnedList(){
  const all=getAllKana();
  const idx=CK_item?all.indexOf(CK_item.k):-1;
  return idx>=0?all.slice(0,idx+1):[CK_item?CK_item.k:''];
}

function updateProgressBars(){
  const ha=[];[HIRA_SEION,HIRA_DAKUTEN,HIRA_YOUON].forEach(s=>s.forEach(r=>r.items.forEach(i=>ha.push(i.k))));
  const ka=[];[KATA_SEION,KATA_DAKUTEN,KATA_YOUON].forEach(s=>s.forEach(r=>r.items.forEach(i=>ka.push(i.k))));
  const hp=Math.round(practicedHira.size/ha.length*100);
  const kp=Math.round(practicedKata.size/ka.length*100);
  document.getElementById('hiraProgressBar').style.width=hp+'%';
  document.getElementById('kataProgressBar').style.width=kp+'%';
  document.getElementById('hiraProgressPct').textContent=hp+'%';
  document.getElementById('kataProgressPct').textContent=kp+'%';
}

function buildGrid(){
  const y=VY,m=VM,isCur=(y===TY&&m===TM);
  const mn=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('habitMonthLabel').textContent=y+'年'+mn[m];
  document.getElementById('nextMonthBtn').style.opacity=isCur?'0.2':'1';
  document.getElementById('nextMonthBtn').style.pointerEvents=isCur?'none':'auto';
  const g=document.getElementById('monthGrid');g.innerHTML='';
  ['一','二','三','四','五','六','日'].forEach(d=>{const e=document.createElement('div');e.className='day-label';e.textContent=d;g.appendChild(e);});
  for(let i=0;i<fwmf(y,m);i++)g.appendChild(document.createElement('div'));
  for(let d=1;d<=dim(y,m);d++){
    const e=document.createElement('div');e.className='day-cell';e.textContent=d;
    const iT=isCur&&d===TD,iF=isCur&&d>TD;
    if(iT){e.classList.add('today');if(DD.has(d))e.style.outline='3px solid #FF6B6B';}
    else if(iF)e.classList.add('future');
    else if(DD.has(d))e.classList.add('done');
    else e.classList.add('empty');
    e.onclick=()=>{
      if(iF)return;
      if(DD.has(d)){DD.delete(d);if(iT)e.style.outline='none';else e.className='day-cell empty';}
      else{DD.add(d);if(iT)e.style.outline='3px solid #FF6B6B';else e.className='day-cell done';}
      sdd(y,m,DD);updStats();
    };
    g.appendChild(e);
  }
}
function prevMonth(){VM--;if(VM<0){VM=11;VY--;}DD=ldd(VY,VM);buildGrid();updStats();}
function nextMonth(){if(VY===TY&&VM===TM)return;VM++;if(VM>11){VM=0;VY++;}DD=ldd(VY,VM);buildGrid();updStats();}
function updStats(){
  document.getElementById('doneNum').textContent=[...DD].length;
  let s=0;if(VY===TY&&VM===TM)for(let d=TD;d>=1;d--){if(DD.has(d))s++;else break;}
  document.getElementById('streakNum').textContent=s;
  document.getElementById('totalCorrectDisp').textContent=AC;
  document.getElementById('totalSessionDisp').textContent=TS;
  renderHist();updateProgressBars();
}
function renderHist(){
  const list=document.getElementById('historyList');list.innerHTML='';

  h.slice(0,5).forEach(e=>{
    const row=document.createElement('div');row.className='history-row';
    const pc=e.pct>=80?'#4ECDC4':e.pct>=60?'#FBBF24':'#FF6B6B';
    const pb=e.pct>=80?'#BBF7D0':e.pct>=60?'#FEF9C3':'#FECACA';
    row.innerHTML=`<div><div style="font-size:12px;font-weight:700;color:#1a1a1a;">${e.date}${e.kana?' · '+e.kana:''}</div><div style="font-size:11px;color:#888;margin-top:1px;">答對 ${e.correct}/${e.total} 題</div></div><div style="border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;background:${pb};color:${pc};">${e.pct}%</div>`;

function renderKanaGrid(){
  const data=getKanaData();
  const practiced=SC==='hira'?practicedHira:practicedKata;
  const chips=SECTION==='dakuten'?CHIP_D:SECTION==='youon'?CHIP_Y:CHIP_C;
  const g=document.getElementById('kanaGrid');g.innerHTML='';
  data.forEach((row,ri)=>{
    const lbl=document.createElement('div');lbl.className='row-label';lbl.textContent=row.row;g.appendChild(lbl);
    const rw=document.createElement('div');rw.className='kana-row';
    row.items.forEach((item,ci)=>{
      const c=document.createElement('div');c.className='kana-chip';
      const ip=practiced.has(item.k);
      c.style.background=ip?'#4ECDC4':chips[(ri*5+ci)%chips.length];
      if(ip)c.style.color='#003330';
      c.id='ch_'+item.k;
      c.textContent=item.k;
      c.onclick=()=>{speak(item.k);selKana(item);};
      rw.appendChild(c);
    });
    g.appendChild(rw);
  });
  const legend=document.createElement('div');
  legend.style.cssText='display:flex;gap:12px;margin-top:12px;font-size:11px;color:#888;align-items:center;';
  legend.innerHTML='<span style="display:inline-flex;align-items:center;gap:4px;"><span style="width:14px;height:14px;border-radius:4px;background:#4ECDC4;display:inline-block;"></span>已練習</span><span style="display:inline-flex;align-items:center;gap:4px;"><span style="width:14px;height:14px;border-radius:4px;background:#FFE66D;display:inline-block;"></span>未練習</span><span>點假名自動發音</span>';
  g.appendChild(legend);
}
async function selKana(item){
  document.querySelectorAll('.kana-chip').forEach(c=>c.classList.remove('selected'));
  const ch=document.getElementById('ch_'+item.k);if(ch)ch.classList.add('selected');
  CK_item=item;CONTENT=null;
  speak(item.k);
  const vp=document.getElementById('vocabPanel');
  vp.style.display='block';vp.className='vocab-panel';vp.style.background='#F0EBE3';
  const learned=getLearnedList();
  vp.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
    <div style="font-size:48px;font-weight:800;color:#1a1a1a;">${item.k}</div>
    <div>
      <div style="font-size:13px;font-weight:600;color:#555;">${item.r}</div>
    </div>
  </div>
  <div class="loading"><div class="spinner"></div><div style="font-size:13px;font-weight:600;color:#888;">AI 生成「${item.k}」專屬內容...</div></div>`;
  vp.scrollIntoView({behavior:'smooth',block:'nearest'});
  try{
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({kana:item.k,roma:item.r,scriptType:SC,learnedKana:learned})
    });
    if(!res.ok)throw new Error('API error');
    const c=await res.json();
    CONTENT=c;showDetail(item,c);
  }catch(e){
    vp.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;"><div style="font-size:48px;font-weight:800;color:#1a1a1a;">${item.k}</div></div><div class="err"><div style="font-size:13px;font-weight:700;color:#991B1B;margin-bottom:5px;">生成失敗，請稍後再試</div><button onclick="selKana(CK_item)" style="background:#FF6B6B;color:#fff;border:none;border-radius:16px;padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;">重新嘗試</button></div>`;
  }
}
function showDetail(item,c){
  const vp=document.getElementById('vocabPanel');
  vp.style.background=CC[Math.floor(Math.random()*CC.length)];
  vp.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
    <div style="width:52px;height:52px;" class="wiggle">${CHAR_SVG[CK[Math.floor(Math.random()*CK.length)]]}</div>
    <div>
      <div style="font-size:48px;font-weight:800;color:#1a1a1a;line-height:1;">${item.k}</div>
      <div style="font-size:13px;font-weight:600;color:#555;">${item.r}</div>
    </div>
  </div>`;
  (c.vocab||[]).forEach((v,i)=>{
    const el=document.createElement('div');el.className='vocab-item';el.style.background=VC[i%VC.length];
    el.innerHTML=`<div class="vocab-word">${v.word}</div><div class="vocab-mean">${v.roma}　${v.meaning}</div>`;
    vp.appendChild(el);
  });
  const btn=document.createElement('button');btn.className='to-scene-btn';
  btn.textContent=`開始「${item.k}」例句練習 →`;
  btn.onclick=()=>startSes(item,c);vp.appendChild(btn);
}
function startSes(item,c){
  CK_item=item;CONTENT=c;sesC=0;sesT=0;curLesson=0;extraQuizIdx=0;usedEQ=new Set();
  if(SC==='hira')practicedHira.add(item.k);else practicedKata.add(item.k);
  savePracticed();
  document.getElementById('p3title').textContent=`「${item.k}」例句 & 練習`;
  goPage(3);renderSbar();showLesson();
}
function renderSbar(){
  const b=document.getElementById('sessionBarWrap');b.innerHTML='';
  const d=document.createElement('div');d.className='session-bar';
  const pct=sesT>0?Math.round(sesC/sesT*100):0;
  d.innerHTML=`<div class="s-stat"><div class="s-num">${sesT}</div><div class="s-lbl">已答</div></div><div class="s-stat"><div class="s-num" style="color:#FF6B6B;">${sesC}</div><div class="s-lbl">答對</div></div><div class="s-stat"><div class="s-num" style="color:#4ECDC4;">${pct}%</div><div class="s-lbl">正確率</div></div><button class="stop-btn" onclick="finSes()">結束✓</button>`;
  b.appendChild(d);
}
function showLesson(){
  const lessons=CONTENT.lessons||[];
  const la=document.getElementById('lessonArea');la.innerHTML='';
  const ea=document.getElementById('extraQuizArea');ea.innerHTML='';
  if(curLesson>=lessons.length){showExtraQuiz();return;}
  const lesson=lessons[curLesson];
  const bg=CC[curLesson%CC.length];
  const card=document.createElement('div');card.className='lesson-card';card.style.background=bg;
  const chars=document.createElement('div');chars.style.cssText='display:flex;justify-content:center;gap:16px;margin-bottom:12px;';
  [0,1].forEach(i=>{const w=document.createElement('div');w.className=i===0?'bounce':'wiggle';w.style.cssText='width:48px;height:48px;';w.innerHTML=CHAR_SVG[CK[Math.floor(Math.random()*CK.length)]];chars.appendChild(w);});
  card.appendChild(chars);
  // Sentence with speak button
  const jpRow=document.createElement('div');jpRow.style.cssText='display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;';
  const jpText=document.createElement('div');jpText.className='sentence-jp';jpText.style.marginBottom='0';jpText.textContent=lesson.jp;
  const speakBtn=document.createElement('button');speakBtn.className='speak-btn';speakBtn.textContent='🔊';
  speakBtn.style.cssText='flex-shrink:0;margin-top:4px;font-size:22px;background:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;';
  speakBtn.setAttribute('data-speak', lesson.jp);
  speakBtn.addEventListener('click', function(){ speak(this.getAttribute('data-speak')); });
  jpRow.appendChild(jpText);jpRow.appendChild(speakBtn);
  card.appendChild(jpRow);
  card.innerHTML+=`<div class="sentence-roma">${lesson.roma||''}</div><div class="sentence-zh">${lesson.zh}</div>`;
  if(lesson.words&&lesson.words.length){
    const wb=document.createElement('div');wb.className='word-breakdown';
    lesson.words.forEach((w,i)=>{const t=document.createElement('div');t.className='word-tag';t.style.background=WC[i%WC.length];t.innerHTML=`<span style="font-weight:700;">${w.w}</span> <span style="opacity:.75;">${w.m}</span>`;wb.appendChild(t);});
    card.appendChild(wb);
  }
  if(lesson.quiz){
    const qb=document.createElement('div');qb.className='quiz-box';
    qb.innerHTML=`<div class="quiz-q">${lesson.quiz.q}</div>`;
    const opts=document.createElement('div');opts.className='opts';
    const res=document.createElement('div');res.className='quiz-res';
    const nb=document.createElement('button');nb.className='next-btn';nb.style.display='none';
    nb.textContent=curLesson>=lessons.length-1?'做額外練習題 →':'下一個例句 →';
    nb.onclick=()=>{curLesson++;renderSbar();showLesson();window.scrollTo(0,0);};
    lesson.quiz.opts.forEach((opt,i)=>{
      const b=document.createElement('button');b.className='opt';b.style.background=OC[i%OC.length];b.textContent=opt;
      b.onclick=()=>{
        if(b.disabled)return;sesT++;
        opts.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        if(i===lesson.quiz.ans){sesC++;AC++;b.classList.add('correct');res.textContent='✓ 答對了！';res.style.color='#065F46';}
        else{b.classList.add('wrong');opts.querySelectorAll('.opt')[lesson.quiz.ans].classList.add('correct');res.textContent='✗ 答錯了，再記一次！';res.style.color='#991B1B';}
        sg();renderSbar();nb.style.display='block';
      };opts.appendChild(b);
    });
    qb.appendChild(opts);qb.appendChild(res);qb.appendChild(nb);card.appendChild(qb);
  }
  la.appendChild(card);
}
function showExtraQuiz(){
  const eqs=CONTENT.extra_quiz||[];
  if(!eqs.length){finSes();return;}
  if(usedEQ.size>=eqs.length)usedEQ=new Set();
  let idx;do{idx=Math.floor(Math.random()*eqs.length);}while(usedEQ.has(idx)&&usedEQ.size<eqs.length);
  usedEQ.add(idx);
  const q=eqs[idx];
  const ea=document.getElementById('extraQuizArea');ea.innerHTML='';
  const qb=document.createElement('div');qb.className='extra-quiz-section';
  qb.innerHTML=`<div class="eq-title">📝 額外練習 ${extraQuizIdx+1}</div><div class="eq-q">${q.q}</div>`;
  const opts=document.createElement('div');opts.className='opts';
  const res=document.createElement('div');res.className='quiz-res';res.style.marginBottom='4px';
  const nb=document.createElement('button');nb.className='next-btn';nb.style.display='none';nb.textContent='下一題 →';
  nb.onclick=()=>{extraQuizIdx++;renderSbar();showExtraQuiz();window.scrollTo(0,0);};
  q.opts.forEach((opt,i)=>{
    const b=document.createElement('button');b.className='opt';b.style.background=OC[i%OC.length];b.textContent=opt;
    b.onclick=()=>{
      if(b.disabled)return;sesT++;
      opts.querySelectorAll('.opt').forEach(x=>x.disabled=true);
      if(i===q.ans){sesC++;AC++;b.classList.add('correct');res.textContent='✓ 答對了！';res.style.color='#065F46';}
      else{b.classList.add('wrong');opts.querySelectorAll('.opt')[q.ans].classList.add('correct');res.textContent='✗ 答錯了！';res.style.color='#991B1B';}
      sg();renderSbar();nb.style.display='block';
    };opts.appendChild(b);
  });
  qb.appendChild(opts);qb.appendChild(res);qb.appendChild(nb);ea.appendChild(qb);
}
function finSes(){
  if(sesT>0){ahist(sesC,sesT,CK_item?CK_item.k:'');TS++;sg();DD.add(TD);sdd(TY,TM,DD);}
  document.getElementById('lessonArea').innerHTML='';
  document.getElementById('extraQuizArea').innerHTML='';
  document.getElementById('sessionBarWrap').innerHTML='';
  const pct=sesT>0?Math.round(sesC/sesT*100):0,isG=pct>=70;
  const done=document.createElement('div');
  done.style.cssText=`background:${isG?'#FFE66D':'#A8E6CF'};border-radius:28px;padding:24px 18px;text-align:center;`;
  done.innerHTML=`<div style="display:flex;justify-content:center;margin-bottom:14px;" class="bounce"><div style="width:64px;height:64px;">${CHAR_SVG[isG?'excited':'joyful']}</div></div>
  <div style="font-size:16px;font-weight:800;color:#1a1a1a;margin-bottom:6px;">練習完成！✓</div>
  <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:4px;">「${CK_item?CK_item.k:''}」答對 ${sesC}/${sesT} 題（${pct}%）</div>
  <div style="font-size:12px;color:#777;">累積答對 ${AC} 題 ★</div>`;
  const row=document.createElement('div');row.style.cssText='display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;';
  const mk=(txt,bg,fn)=>{const b=document.createElement('button');b.className='next-btn';b.style.cssText=`flex:1;background:${bg};margin-top:0;font-size:13px;`;b.textContent=txt;b.onclick=fn;return b;};
  row.appendChild(mk('繼續練習 →','#1a1a1a',async()=>{
    document.getElementById('lessonArea').innerHTML=`<div class="loading"><div class="spinner"></div><div style="font-size:13px;font-weight:600;color:#888;">生成新一輪...</div></div>`;
    try{
      const learned=getLearnedList();
      const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kana:CK_item.k,roma:CK_item.r,scriptType:SC,learnedKana:learned})});
      const nc=await res.json();CONTENT=nc;startSes(CK_item,nc);
    }catch(e){startSes(CK_item,CONTENT);}
  }));
  row.appendChild(mk('選其他假名','#FF6B6B',()=>goPage(2)));
  row.appendChild(mk('首頁','#555',()=>goPage(1)));
  done.appendChild(row);
  document.getElementById('lessonArea').appendChild(done);
}
document.getElementById('p1char').innerHTML=CHAR_SVG.excited;
setTodayLabel();buildGrid();updStats();
</script>
