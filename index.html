<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>test</title></head>
<body>
<button onclick="test()">測試</button>
<div id="r"></div>
<script>
async function test(){
  const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kana:'あ',roma:'a',scriptType:'hira',learnedKana:['あ']})});
  const d=await r.json();
  document.getElementById('r').textContent=d.vocab?'成功:'+d.vocab[0].word:JSON.stringify(d);
}
</script>
</body>
</html>
